name: CI/CD Pipeline - Receptor

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.set_tag.outputs.VERSION_TAG }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Extract sanitized branch name
        id: vars
        run: |
          RAW_BRANCH="${{ github.ref_name }}"
          CLEAN_BRANCH=$(echo "$RAW_BRANCH" | sed -E 's:^(feature/|hotfix/|bugfix/|release/)::')
          echo "branch_name=$CLEAN_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Set version tag
        id: set_tag
        run: |
          TAG="1.0.${{ github.run_number }}-${{ steps.vars.outputs.branch_name }}"
          echo "VERSION_TAG=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


  docker:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      docker_image: ${{ steps.set_image.outputs.DOCKER_IMAGE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Docker image name
        id: set_image
        run: |
          IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ needs.build.outputs.version_tag }}"
          echo "DOCKER_IMAGE=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          docker build -t app-image .
          docker tag app-image:latest ${{ steps.set_image.outputs.DOCKER_IMAGE }}
          docker push ${{ steps.set_image.outputs.DOCKER_IMAGE }}



  deploy:
    runs-on: ubuntu-latest
    needs: [build, docker] 
    steps:
      - name: Set up SSH key
        run: |
          echo "${{ secrets.EC2_KEY }}" > /tmp/ssh_key.pem
          chmod 600 /tmp/ssh_key.pem

      - name: Deploy to EC2
        env:
          DOCKER_IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ needs.build.outputs.version_tag }}
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST_DEV }} << EOF
            # 1. Autenticación en ECR
            aws ecr get-login-password --region ${{ secrets.AWS_DEFAULT_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com
            
            # 2. Descargar la nueva imagen
            docker pull $DOCKER_IMAGE
            
            # 3. Limpieza (¡Nombres corregidos!)
            docker stop receptor-app || true
            docker rm receptor-app || true
            
            # 4. Levantar el nuevo contenedor worker
            docker run -d --name receptor-app \
              -e AWS_REGION="${{ secrets.AWS_DEFAULT_REGION }}" \
              -e SQS_QUEUE_NAME="cola-boletines" \
              -e DYNAMO_TABLE_NAME="boletines_recibidos" \
              -e SNS_TOPIC_ARN="${{ secrets.SNS_TOPIC_ARN }}" \
              -e MOSTRADOR_BASE_URL="http://${{ secrets.EC2_HOST_DEV }}:8001" \
              $DOCKER_IMAGE
          EOF